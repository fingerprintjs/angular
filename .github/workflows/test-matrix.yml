name: Test Angular Matrix

on:
  pull_request:

jobs:
  test-matrix:
    name: Angular ${{ matrix.angular-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        angular-version: [15, 16, 17, 18, 19, 20, 21]
        include:
          - angular-version: 15
            node-version: 18
          - angular-version: 16
            node-version: 18
          - angular-version: 17
            node-version: 18
          - angular-version: 18
            node-version: 20
          - angular-version: 19
            node-version: 20
          - angular-version: 20
            node-version: 20
          - angular-version: 21
            node-version: 22

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install

      - name: Generate project version
        run: pnpm generate:version

      - name: Setup environment variables
        run: |
          echo "CI=true" >> $GITHUB_ENV
          echo "NG_CLI_ANALYTICS=false" >> $GITHUB_ENV
          echo "LIB_NAME=fingerprintjs-pro-angular" >> $GITHUB_ENV

      - name: Run tests for Angular ${{ matrix.angular-version }}
        run: pnpm run test:matrix -- --version=${{ matrix.angular-version }}
